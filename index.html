<script src="https://unpkg.com/@niivue/niivue@0.42.1/dist/index.js"></script>

<style>
    #mri-clinical-suite {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        max-width: 100%;
        margin: 20px auto;
        box-sizing: border-box;
    }
    .mri-header {
        border-bottom: 1px solid #334155;
        padding-bottom: 15px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
    }
    .mri-title {
        margin: 0;
        font-size: 1.2rem;
        color: #38bdf8;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .mri-controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }
    .mri-btn, .mri-select {
        background-color: #1e293b;
        color: #e2e8f0;
        border: 1px solid #475569;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: 0.2s;
        font-weight: 600;
    }
    .mri-btn:hover {
        background-color: #3b82f6;
        color: white;
    }
    .mri-btn.active {
        background-color: #0284c7;
        border-color: #0ea5e9;
    }
    .mri-canvas-container {
        width: 100%;
        height: 600px;
        background-color: #000;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #334155;
    }
    #mri-gl-canvas {
        width: 100%;
        height: 100%;
        display: block;
        outline: none;
    }
    .mri-footer {
        margin-top: 15px;
        font-size: 0.75rem;
        color: #94a3b8;
        display: flex;
        justify-content: space-between;
    }
</style>

<div id="mri-clinical-suite">
    <div class="mri-header">
        <h2 class="mri-title">Volumetric Imaging Suite</h2>
        <div class="mri-controls">
            <button class="mri-btn" onclick="changeView('axial')">Axial</button>
            <button class="mri-btn" onclick="changeView('coronal')">Coronal</button>
            <button class="mri-btn" onclick="changeView('sagittal')">Sagittal</button>
            <button class="mri-btn active" id="btn-multi" onclick="changeView('multi')">Multi-Planar</button>
            <button class="mri-btn" style="background-color: #4f46e5;" onclick="changeView('3d')">3D Render</button>
            
            <select class="mri-select" id="colormap-select" onchange="changeColorMap()">
                <option value="gray">Grayscale (Standard)</option>
                <option value="plasma">Plasma (Heatmap)</option>
                <option value="viridis">Viridis (Tissue)</option>
                <option value="red">Red (Vascular)</option>
            </select>
        </div>
    </div>

    <div class="mri-canvas-container">
        <canvas id="mri-gl-canvas"></canvas>
    </div>

    <div class="mri-footer">
        <span><strong>Controls:</strong> Scroll to change slice | Right-Click + Drag for Window/Level | Drag & Drop .nii / .dcm files to load local data</span>
        <span id="mri-status">Status: SYSTEM READY</span>
    </div>
</div>

<script>
    // Initialize the advanced Niivue renderer
    const nv = new niivue.Niivue({
        dragAndDropEnabled: true,
        backColor: [0, 0, 0, 1], // Pure black background for clinical accuracy
        show3Dcrosshair: true,   // Syncs crosshairs across all views
        crosshairColor: [0, 1, 0, 1], // Green crosshairs
        isColorbar: true         // Shows measurement scale
    });
    
    // Attach to canvas
    nv.attachTo('mri-gl-canvas');

    // Load default high-res Brain NIfTI
    nv.loadVolumes([{
        url: 'https://niivue.github.io/niivue/images/mni152.nii.gz',
        name: 'mni152',
        colormap: 'gray'
    }]).then(() => {
        // Set to multi-planar view by default once loaded
        nv.setSliceType(nv.sliceTypeMultiplanar);
        document.getElementById('mri-status').innerText = "Status: DEFAULT VOLUME LOADED";
    });

    // Function to handle switching views
    function changeView(viewType) {
        // Reset button styles
        document.querySelectorAll('.mri-btn').forEach(btn => btn.classList.remove('active'));
        
        // Apply selected view
        if (viewType === 'axial') nv.setSliceType(nv.sliceTypeAxial);
        if (viewType === 'coronal') nv.setSliceType(nv.sliceTypeCoronal);
        if (viewType === 'sagittal') nv.setSliceType(nv.sliceTypeSagittal);
        if (viewType === 'multi') nv.setSliceType(nv.sliceTypeMultiplanar);
        if (viewType === '3d') nv.setSliceType(nv.sliceTypeRender);
        
        event.target.classList.add('active');
    }

    // Function to handle color maps for tissue differentiation
    function changeColorMap() {
        const selectedMap = document.getElementById('colormap-select').value;
        if (nv.volumes.length > 0) {
            nv.volumes[0].colormap = selectedMap;
            nv.updateGLVolume();
        }
    }
</script>
