<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D MRI Workstation (NIfTI/DICOM)</title>
    <script src="https://unpkg.com/@niivue/niivue@0.42.1/dist/index.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #d1d5db;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .workstation {
            display: flex;
            gap: 20px;
            background: #111827;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #374151;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            max-width: 1100px;
            width: 100%;
        }
        .controls-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #1f2937;
            padding: 20px;
            border-radius: 6px;
        }
        .screen-panel {
            flex: 2.5;
            display: flex;
            flex-direction: column;
            background-color: #000;
            border-radius: 6px;
            border: 1px solid #4b5563;
            position: relative;
        }
        h2 { margin-top: 0; color: #60a5fa; font-size: 1.2rem; text-transform: uppercase; border-bottom: 1px solid #374151; padding-bottom: 10px;}
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: bold; color: #9ca3af; text-transform: uppercase; }
        select, button { padding: 8px; border-radius: 4px; border: 1px solid #4b5563; background-color: #111827; color: #fff; }
        button { background-color: #2563eb; font-weight: bold; cursor: pointer; padding: 12px; transition: 0.2s;}
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #374151; color: #6b7280; cursor: not-allowed; }
        
        /* The WebGL Canvas replaces the img tag */
        canvas {
            width: 100%;
            height: 500px;
            display: block;
            outline: none;
        }
        
        .instructions {
            font-size: 0.8rem;
            color: #fbbf24;
            background: #451a03;
            padding: 10px;
            border-radius: 4px;
            margin-top: 20px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="workstation">
        <div class="controls-panel">
            <h2>3D Acquisition Console</h2>
            
            <div class="control-group">
                <label>Select Dataset (NIfTI Format)</label>
                <select id="dataset-select">
                    <option value="https://niivue.github.io/niivue/images/mni152.nii.gz">High-Res Brain Template (MNI152)</option>
                    <option value="https://niivue.github.io/niivue/images/hippo.nii.gz">High-Res Hippocampus</option>
                </select>
            </div>
            
            <button id="scan-btn" onclick="startVolumetricScan()">LOAD 3D VOLUME</button>

            <div class="instructions">
                <strong>RADIOLOGIST CONTROLS:</strong><br>
                • <strong>Scroll Wheel:</strong> Move through slices (Z-axis).<br>
                • <strong>Right-Click & Drag:</strong> Adjust Window/Level (Contrast/Brightness).<br>
                • <strong>Left-Click & Drag:</strong> Pan the image.<br>
                • <strong>Drag & Drop:</strong> You can drag a .dcm or .nii file straight from your computer onto the screen to view it!
            </div>
        </div>

        <div class="screen-panel">
            <canvas id="gl-canvas"></canvas>
        </div>
    </div>

    <script>
        // Initialize the Niivue renderer
        const nv = new niivue.Niivue({
            dragAndDropEnabled: true, // Allows dragging .dcm or .nii files from desktop
            backColor: [0, 0, 0, 1],  // Black background
            show3Dcrosshair: true,
            isColorbar: true
        });
        
        // Attach the renderer to our canvas
        nv.attachTo('gl-canvas');

        // Set default view to Axial
        nv.setSliceType(nv.sliceTypeAxial);

        async function startVolumetricScan() {
            const scanBtn = document.getElementById('scan-btn');
            const fileUrl = document.getElementById('dataset-select').value;
            
            scanBtn.disabled = true;
            scanBtn.innerText = "FETCHING VOLUME...";

            try {
                // Clear the current canvas
                nv.volumes = [];
                
                // Fetch and load the NIfTI volumetric data
                await nv.loadVolumes([{
                    url: fileUrl,
                    name: 'patient_volume'
                }]);
                
                scanBtn.innerText = "VOLUME LOADED";
                setTimeout(() => {
                    scanBtn.disabled = false;
                    scanBtn.innerText = "LOAD 3D VOLUME";
                }, 2000);

            } catch (error) {
                alert("Error fetching volume. It might be a CORS restriction or a bad network connection.");
                console.error(error);
                scanBtn.disabled = false;
                scanBtn.innerText = "LOAD 3D VOLUME";
            }
        }
    </script>
</body>
</html>
