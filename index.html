<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal 3D Image Viewer</title>
    <script src="https://unpkg.com/@niivue/niivue@0.42.1/dist/index.js"></script>
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        h2 { color: #5c9ce6; }
        canvas { 
            width: 100%; 
            height: 60vh; 
            background: #000; 
            margin-top: 20px; 
            border: 2px solid #333; 
            border-radius: 8px;
        }
        .btn { 
            background: #238636; 
            color: white; 
            padding: 15px 30px; 
            font-size: 16px; 
            font-weight: bold;
            border: none; 
            cursor: pointer; 
            border-radius: 5px; 
            text-transform: uppercase;
        }
        .btn:hover { background: #2ea043; }
        #error-box { 
            background: #440000; 
            color: #ff5555; 
            padding: 20px; 
            border: 1px solid red; 
            border-radius: 5px; 
            margin-top: 20px; 
            display: none; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Minimal 3D Viewer</h2>
    <p>Click the button below to open a file from your device.</p>

    <input type="file" id="file-input" style="display: none;" accept=".nii,.nii.gz,.dcm">
    <button class="btn" onclick="document.getElementById('file-input').click()">📂 Open 3D Image</button>

    <div id="error-box"></div>

    <canvas id="gl"></canvas>

    <script>
        // 1. HARDWARE DIAGNOSTIC
        // Check if the device's graphics card supports WebGL2
        const canvas = document.getElementById('gl');
        const glContext = canvas.getContext('webgl2');
        
        if (!glContext) {
            // If WebGL2 is missing, show a fatal error
            const errorBox = document.getElementById('error-box');
            errorBox.style.display = 'block';
            errorBox.innerHTML = "❌ HARDWARE ERROR: Your current web browser or device does not support WebGL2.<br><br>3D medical rendering is physically impossible on this specific device/browser. Please try opening this page on a desktop computer (Chrome/Edge).";
        } else {
            // 2. INITIALIZE VIEWER
            try {
                const nv = new niivue.Niivue({
                    backColor: [0, 0, 0, 1],
                    show3Dcrosshair: true
                });
                
                nv.attachTo('gl');
                nv.setSliceType(nv.sliceTypeMultiplanar); // Shows all 3 planes (Axial, Coronal, Sagittal)

                // 3. HANDLE FILE SELECTION
                document.getElementById('file-input').addEventListener('change', async function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        try {
                            // Clear previous errors
                            document.getElementById('error-box').style.display = 'none';
                            
                            // Load the local file
                            await nv.loadFromFile(file);
                        } catch (err) {
                            const errorBox = document.getElementById('error-box');
                            errorBox.style.display = 'block';
                            errorBox.innerText = "❌ ERROR: Could not read file. Ensure it is a valid .nii or .nii.gz file.";
                        }
                    }
                    // Reset the file input so you can select the same file again if needed
                    e.target.value = '';
                });

            } catch (e) {
                const errorBox = document.getElementById('error-box');
                errorBox.style.display = 'block';
                errorBox.innerText = "❌ ENGINE CRASH: " + e.message;
            }
        }
    </script>

</body>
</html>
